name: ChirpFlock
widgets:
  - layout_id: 823116a1-d080-42de-be05-891b23a3df12
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      multiEmbed: $bool:false
      webUrl:
        valueRef:
          tablename: devices
          column: url
          queryParams:
            limit: 1
            filterAnd:
              - dataType: string
                useRoute: true
                column: devname
                operator: =
                value: "1"
              - dataType: boolean
                latest: true
                column: ""
                operator: =
                value: ""
      title: null
    custom_style: null
  - layout_id: a28045b0-36e5-4774-8746-f24d124814dd
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      gap: $num:4
      data:
        tableRef:
          format:
            title: null
            url: url
          tablename: devices
          queryParams:
            limit: 1
            filterAnd:
              - column: ""
                operator: =
                value: ""
                dataType: boolean
                latest: true
      multiEmbed: $bool:true
      title: null
    custom_style: null
  - layout_id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
    package_name: widget-navbar
    version: 1.0.14
    chartconfig:
      leadingSlash: null
      trailingSlash: null
      title: $str:Home
      variables: []
      style:
        fontWeight: $num:400
        fontSize: $num:16
      navItems:
        tableRef:
          format:
            trailingSlash: null
            variables: []
            label: devname
            iconName: $str:hard_drive
            route: devname
            leadingSlash: null
          tablename: devices
          queryParams:
            nowMinusPeriods: 0
            limit: 100
            filterAnd:
              - value: ""
                dataType: boolean
                latest: true
                column: ""
                operator: =
            windowPeriod: null
            windowLength: 5
      route: $str:/
    custom_style: null
  - layout_id: b198a267-0ef2-49ef-af1a-5f2a170e06c5
    package_name: widget-toast
    version: 1.0.5
    chartconfig:
      errorColor: "$str:"
      displayTime: $num:4000
      showCloseButton: $bool:true
      message:
        valueRef:
          tablename: error-logs
          column: msg
      maxVisible: $num:3
      type:
        valueRef:
          tablename: error-logs
          column: level
      warningColor: "$str:"
      successColor: "$str:"
      showIcon: $bool:true
      infoColor: "$str:"
      position: $str:bottom-left
    custom_style:
      tile_background_color: "#fff0"
      tile_border_color: "#fff0"
  - layout_id: ff38a260-f2ef-4016-9d51-19451f68e9e2
    package_name: widget-textbox
    version: 1.1.8
    chartconfig:
      body:
        text: "$str:"
        color: ""
        backgroundColor: ""
      title:
        text: $str:Pick a Node-RED server above
        color: ""
        backgroundColor: ""
      subTitle:
        color: ""
        text: "$str:"
layout:
  groups: []
  gridLayout:
    - z: 1000
      fixedHeight: true
      y: 0
      w: 96
      h: 5
      id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
      x: 0
    - id: a28045b0-36e5-4774-8746-f24d124814dd
      x: 0
      y: 5
      w: 96
      z: 1001
      h: 59
    - w: 50
      h: 17
      z: 1002
      id: b198a267-0ef2-49ef-af1a-5f2a170e06c5
      x: 0
      y: 47
  subRoutes:
    "*":
      groups: []
      gridLayout:
        - y: 0
          w: 96
          h: 5
          z: 1000
          fixedHeight: true
          id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
          x: 0
        - x: 0
          z: 1001
          y: 5
          w: 96
          h: 59
          id: 823116a1-d080-42de-be05-891b23a3df12
        - h: 17
          z: 1002
          id: b198a267-0ef2-49ef-af1a-5f2a170e06c5
          x: 0
          y: 47
          w: 50
style:
  theme:
    theme_name: purple-passion
  background_color: "#5b5c6e"
  text_color: "#fff"
  tile_background_color: "#5b5c6e"
  tile_border_color: "#0000"
  grid_gap: 0
  tile_border_radius: 0px

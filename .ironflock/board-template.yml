name: ChirpFlock
widgets:
  
  - layout_id: 823116a1-d080-42de-be05-891b23a3df12
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      webUrl:
        valueRef:
          queryParams:
            filterAnd:
              - column: devname
                operator: =
                value: "1"
                dataType: string
                useRoute: true
              - value: "true"
                dataType: boolean
                column: latest_flag
                operator: =
            limit: 1
          tablename: devices
          column: url
      title: null
      multiEmbed: $bool:false
    custom_style: null
  - layout_id: a28045b0-36e5-4774-8746-f24d124814dd
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      multiEmbed: $bool:true
      title: null
      gap: $num:4
      data:
        tableRef:
          tablename: devices
          queryParams:
            limit: 1
            filterAnd:
              - dataType: boolean
                column: latest_flag
                operator: =
                value: "true"
          format:
            title: null
            url: url
    custom_style: null
  - layout_id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
    package_name: widget-navbar
    version: 1.0.14
    chartconfig:
      variables: []
      style:
        fontSize: $num:16
        fontWeight: $num:400
      navItems:
        tableRef:
          tablename: devices
          queryParams:
            nowMinusPeriods: 0
            limit: 100
            filterAnd:
              - operator: =
                value: "true"
                dataType: boolean
                column: latest_flag
            windowPeriod: null
            windowLength: 5
          format:
            label: devname
            iconName: $str:hard_drive
            route: devname
            leadingSlash: null
            trailingSlash: null
            variables: []
      route: $str:/
      leadingSlash: null
      trailingSlash: null
      title: $str:Home
    custom_style: null
  - layout_id: ff38a260-f2ef-4016-9d51-19451f68e9e2
    package_name: widget-textbox
    version: 1.1.8
    chartconfig:
      subTitle:
        text: "$str:"
        color: ""
      body:
        color: ""
        backgroundColor: ""
        text: "$str:"
      title:
        text: $str:Pick a Node-RED server above
        color: ""
        backgroundColor: ""
layout:
  gridLayout:
    - z: 999
      fixedHeight: true
      y: 0
      w: 96
      h: 5
      id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
      x: 0
    - y: 5
      w: 96
      z: 1001
      h: 59
      id: a28045b0-36e5-4774-8746-f24d124814dd
      x: 0
  subRoutes:
    "*":
      gridLayout:
        - h: 5
          z: 1000
          fixedHeight: true
          id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
          x: 0
          y: 0
          w: 96
        - z: 1001
          y: 5
          w: 96
          h: 59
          id: 823116a1-d080-42de-be05-891b23a3df12
          x: 0
      groups: []
  groups: []
style:
  theme:
    theme_name: purple-passion
  background_color: "#5b5c6e"
  text_color: "#fff"
  tile_background_color: "#5b5c6e"
  tile_border_color: "#0000"
  grid_gap: 0
  tile_border_radius: 0px

services:
  chirpstack:
    # image: chirpstack/chirpstack:4
    build:
      context: configuration/chirpstack
    command: -c /etc/chirpstack # import-legacy-lorawan-devices-repository -d /tmp/lorawan-devices
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=postgres
      # Kept in sync with the postgres service below; default chirpstack/chirpstack/chirpstack.
      - POSTGRESQL_USER=${POSTGRES_USER:-chirpstack}
      - POSTGRESQL_PASS=${POSTGRES_PASSWORD:-chirpstack}
      - POSTGRESQL_DB=${POSTGRES_DB:-chirpstack}
    volumes:
      # Persists the per-deployment gateway CA + API secret generated by
      # entrypoint.sh, so they survive restarts and image updates.
      - chirpstackcerts:/etc/chirpstack/certs
    ports:
      - "47836:47836"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:47836/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  chirpstack-gateway-bridge:
    # image: chirpstack/chirpstack-gateway-bridge:4
    build:
      context: configuration/chirpstack-gateway-bridge
    restart: unless-stopped
    ports:
      - "1700:1700/udp"
    environment:
      - INTEGRATION__MQTT__SERVER=mosquitto:1883
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/command/#
    depends_on:
      mosquitto:
        condition: service_healthy

  chirpstack-gateway-bridge-basicstation:
    # image: chirpstack/chirpstack-gateway-bridge:4
    build:
      context: configuration/chirpstack-gateway-bridge
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "47830:47830" # CUPS / LNS
    environment:
      - INTEGRATION__MQTT__SERVER=mosquitto:1883
    depends_on:
      mosquitto:
        condition: service_healthy

  postgres:
    # image: postgres:14-alpine
    build:
      context: configuration/postgresql
    restart: unless-stopped
    volumes:
      # - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chirpstack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chirpstack}
      - POSTGRES_DB=${POSTGRES_DB:-chirpstack}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    # image: eclipse-mosquitto:2
    build:
      context: configuration/mosquitto
    restart: unless-stopped
    # MQTT (1883) is the internal bus between ChirpStack, the gateway bridges,
    # and ironflock_publisher (which subscribes to uplink events here and is the
    # source of all IronFlock data collection). It is intentionally NOT published
    # to the host or exposed for remote access (see .ironflock/port-template.yml)
    # because the broker allows anonymous access. All of those services reach it
    # over the compose network as "mosquitto:1883", so keeping it internal does
    # not affect data collection.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1883"]
      interval: 10s
      timeout: 5s
      retries: 5

  ironflock_publisher:
    # image: chirpstack/chirpstack:4
    build:
      context: ironflock_publish
    restart: unless-stopped
    # DEVICE_KEY / APPLICATION_ID are injected by the IronFlock platform at
    # runtime. For a purely local `docker compose up`, export DEVICE_KEY first
    # (see README) or this service will log a clear error and restart.
    depends_on:
      mosquitto:
        condition: service_healthy
      chirpstack:
        condition: service_started

volumes:
  postgresqldata:
  redisdata:
  chirpstackcerts:

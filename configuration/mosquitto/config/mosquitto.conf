listener 1883

# Anonymous access is acceptable ONLY because this broker is not reachable from
# outside the compose network: port 1883 is neither published to the host
# (docker-compose.yml) nor exposed for remote access (.ironflock/port-template.yml).
#
# If you ever expose 1883, switch this off and configure a password file:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
# and add matching credentials to ChirpStack (integration + gateway backend MQTT),
# the gateway bridge, and ironflock_publisher.py.
allow_anonymous true

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint publisher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check ironflock_publish
      - name: Byte-compile
        run: python -m py_compile ironflock_publish/ironflock_publisher.py

  build:
    name: Validate & build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config -q
      - name: Build images
        run: docker compose build
